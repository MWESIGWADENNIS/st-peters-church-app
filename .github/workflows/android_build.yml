name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Prepare Android Project
        run: |
          # Remove any existing android folder to ensure a clean slate
          rm -rf android
          # Create a fresh android project
          npx cap add android
          # Sync the web assets
          npx cap sync

      - name: Generate App Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          # Download the icon from Google Drive
          curl -L "https://drive.google.com/uc?export=download&id=1z4iYWgYpUbCn7eQPWCDp9CjcInlR3W8R" -o icon.png
          if [ ! -s icon.png ]; then
            echo "Icon download failed or file is empty. Using fallback."
            # Fallback to a generic icon if needed or fail the build
            exit 1
          fi
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # Also set as round icons
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: St-Peters-Church-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
