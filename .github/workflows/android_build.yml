name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Prepare Android Project
        run: |
          # Remove any existing android folder to ensure a clean slate
          rm -rf android
          # Create a fresh android project
          npx cap add android
          # Sync the web assets
          npx cap sync

      - name: Check Configuration
        run: |
          if [ "${{ secrets.VITE_SUPABASE_URL }}" == "" ]; then
            echo "::warning::VITE_SUPABASE_URL is not set in GitHub Secrets. The app will be built with placeholder data and will not work correctly."
          fi
          if [ "${{ secrets.VITE_SUPABASE_ANON_KEY }}" == "" ]; then
            echo "::warning::VITE_SUPABASE_ANON_KEY is not set in GitHub Secrets. The app will be built with placeholder data and will not work correctly."
          fi

      - name: Install ImageMagick
        # Required for icon generation
        run: sudo apt-get update && sudo apt-get install -y imagemagick libmagickcore-6.q16-6-extra

      - name: Generate App Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # Download the icon from Google Drive with a more robust script
          FILE_ID="1z4iYWgYpUbCn7eQPWCDp9CjcInlR3W8R"
          
          # Try to get the confirmation code if it exists (for large files)
          CONFIRM=$(curl -sc /tmp/gcookie "https://drive.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          if [ -n "$CONFIRM" ]; then
            echo "Large file detected, using confirmation code."
            curl -Lb /tmp/gcookie "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o icon_src
          else
            echo "Small file or direct download available."
            curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" -o icon_src
          fi
          
          if [ ! -s icon_src ]; then
            echo "Icon download failed or file is empty."
            exit 1
          fi

          # Use 'file' command to detect the actual format (more robust than identify for extensionless files)
          MIME_TYPE=$(file --mime-type -b icon_src)
          echo "Detected MIME type: $MIME_TYPE"
          
          case "$MIME_TYPE" in
            image/png) EXT="png" ;;
            image/jpeg) EXT="jpg" ;;
            image/webp) EXT="webp" ;;
            *) 
              echo "Unknown MIME type, attempting to use identify as fallback..."
              EXT=$(identify -format "%m" icon_src | tr '[:upper:]' '[:lower:]' | head -n 1)
              if [ -z "$EXT" ]; then EXT="png"; fi # Final fallback
              ;;
          esac
          
          mv icon_src "icon.${EXT}"
          SRC_ICON="icon.${EXT}"
          echo "Final source icon: $SRC_ICON"

          # Use ImageMagick to ensure it's properly sized
          # mdpi: 48x48, hdpi: 72x72, xhdpi: 96x96, xxhdpi: 144x144, xxxhdpi: 192x192
          convert "$SRC_ICON" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$SRC_ICON" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$SRC_ICON" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$SRC_ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$SRC_ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # Also set as round icons
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: St-Peters-Church-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

# End of workflow
