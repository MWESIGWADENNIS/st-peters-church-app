name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Prepare Android Project
        run: |
          # Remove any existing android folder to ensure a clean slate
          rm -rf android
          # Create a fresh android project
          npx cap add android
          # Sync the web assets
          npx cap sync

      - name: Check Configuration
        run: |
          if [ "${{ secrets.VITE_SUPABASE_URL }}" == "" ]; then
            echo "::warning::VITE_SUPABASE_URL is not set in GitHub Secrets. The app will be built with placeholder data and will not work correctly."
          fi
          if [ "${{ secrets.VITE_SUPABASE_ANON_KEY }}" == "" ]; then
            echo "::warning::VITE_SUPABASE_ANON_KEY is not set in GitHub Secrets. The app will be built with placeholder data and will not work correctly."
          fi

      - name: Install ImageMagick
        # Required for icon generation
        run: sudo apt-get update && sudo apt-get install -y imagemagick libmagickcore-6.q16-6-extra

      - name: Generate App Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # Check if icon.png exists, is not empty, and is a valid image
          if [ -f "icon.png" ] && [ -s "icon.png" ] && identify icon.png > /dev/null 2>&1; then
            echo "Valid custom icon found. Detecting format..."
            FORMAT=$(identify -format "%m" icon.png | tr '[:upper:]' '[:lower:]' | head -n 1)
            echo "Detected actual format: $FORMAT"
            
            SRC="icon.png"
            if [ "$FORMAT" != "png" ] && [ -n "$FORMAT" ]; then
              mv icon.png "icon.${FORMAT}"
              SRC="icon.${FORMAT}"
            fi
          else
            echo "Custom icon missing, empty, or invalid. Generating fallback icon..."
            # Generate a blue icon with a white 'P' as fallback
            convert -size 512x512 xc:#3b82f6 -fill white -gravity center -pointsize 300 -draw "text 0,0 'P'" icon_fallback.png
            SRC="icon_fallback.png"
          fi

          # Use ImageMagick to ensure it's properly sized
          convert "$SRC" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$SRC" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$SRC" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$SRC" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$SRC" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # Also set as round icons
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: St-Peters-Church-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

# End of workflow
